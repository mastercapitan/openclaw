steps:
- name: 'gcr.io/cloud-builders/docker'
  env:
  - 'DOCKER_BUILDKIT=1'
  args: [
    'build',
    '--build-arg', 'OPENCLAW_EXTENSIONS=',
    '--build-arg', 'BUILDKIT_INLINE_CACHE=1',
    '-t', 'us-central1-docker.pkg.dev/gen-lang-client-0544799436/openclaw-repo/openclaw:latest',
    '.'
  ]
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args: [
    'run', 'deploy', 'openclaw',
    '--image', 'us-central1-docker.pkg.dev/gen-lang-client-0544799436/openclaw-repo/openclaw:latest',
    '--region', 'us-central1',
    '--platform', 'managed',
    '--allow-unauthenticated'
  ]
images:
- 'us-central1-docker.pkg.dev/gen-lang-client-0544799436/openclaw-repo/openclaw:latest'
options:
  logging: CLOUD_LOGGING_ONLY
  env:
  - 'DOCKER_BUILDKIT=1'
